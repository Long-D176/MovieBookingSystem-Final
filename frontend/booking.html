<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chọn Suất Chiếu & Ghế</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS cho phần chọn Rạp & Giờ */
        .selection-card {
            background: var(--bg-surface);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .selection-card:hover { border-color: var(--accent); background: #2A2A3C; }
        .selection-card.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        /* Ẩn hiện các bước */
        .step-container { display: none; animation: fadeIn 0.5s; }
        .step-container.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">CINE<span style="color:white">WORLD</span>.</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div class="booking-header">
            <h1 id="movie-title" style="color: var(--accent); margin-bottom: 5px;">Movie Title</h1>
            <p style="color: var(--text-sub);">
                <span id="cinema-name">Chọn rạp</span> • 
                <span id="date-display">--/--</span> • 
                <span id="showtime-display">--:--</span>
            </p>
        </div>

        <div id="step-1" class="step-container active">
            
            <h3 style="border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px;">1. Chọn Rạp Chiếu</h3>
            <div id="cinema-list" class="grid-list">
                <p>Đang tải rạp...</p>
            </div>

            <div id="date-section" style="display: none;">
                <h3 style="border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px;">2. Chọn Ngày Chiếu</h3>
                <div id="date-list" class="grid-list"></div>
            </div>

            <div id="time-section" style="display: none;">
                <h3 style="border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px;">3. Chọn Khung Giờ</h3>
                <div id="showtime-list" class="grid-list"></div>
            </div>
        </div>

        <div id="step-2" class="step-container">
            <button class="btn btn-outline" onclick="backToStep1()" style="margin-bottom: 20px;">← Quay lại chọn lịch</button>
            
            <div class="screen-container">
                <div class="screen"></div>
                <div class="seat-grid" id="seat-map"></div>
                <div class="legend">
                    <div class="legend-item"><span style="background:#3A3A50"></span>Standard</div>
                    <div class="legend-item"><span class="vip" style="width:15px;height:15px;display:inline-block;margin-right:5px"></span>VIP</div>
                    <div class="legend-item"><span class="couple" style="width:15px;height:15px;display:inline-block;margin-right:5px"></span>Couple</div>
                    <div class="legend-item"><span style="background:var(--accent)"></span>Đang chọn</div>
                    <div class="legend-item"><span style="background:#444; opacity:0.5"></span>Đã bán</div>
                </div>
            </div>

            <div style="background: var(--bg-surface); padding: 30px; border-radius: var(--radius-lg); margin-top: 40px;">
                <h3 style="border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px;">Combo Bắp Nước</h3>
                <div id="concession-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;"></div>
            </div>

            <div style="height: 100px;"></div> 
            <div style="position: fixed; bottom: 0; left: 0; width: 100%; background: #181818; border-top: 1px solid #333; padding: 20px 0; z-index: 100;">
                <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <p style="color: var(--text-sub); font-size: 14px; margin: 0;">Ghế: <span id="count" style="color: white; font-weight: bold;">0</span></p>
                        <p style="margin: 0; font-size: 20px;">Tổng: <span id="total" style="color: var(--accent); font-weight: bold;">0</span> VND</p>
                    </div>
                    <button class="btn" onclick="bookAndPay()" style="padding: 15px 40px; font-size: 16px;">THANH TOÁN NGAY</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
