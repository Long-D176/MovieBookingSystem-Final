name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: mbs-final

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run static analysis
        run: ruff check services --select E9,F63,F7,F82

      - name: Verify Python syntax
        run: python -m compileall services

      - name: Validate Docker Compose
        run: docker compose config

      - name: Validate k3s deployment scripts
        run: docker run --rm -v "$PWD:/workspace" -w /workspace bash:5.2 bash -n deploy/k3s/install-k3s.sh deploy/k3s/setup-nginx-k3s.sh deploy/k3s/restore-nginx-compose.sh deploy/k3s/deploy-k3s.sh

      - name: Render k3s manifests
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace alpine:3.21 sh -lc "
            apk add --no-cache gettext >/dev/null &&
            export K8S_NAMESPACE=moviebooking K8S_APP_NODEPORT=30080 K8S_GRAFANA_NODEPORT=30081 IMAGE_NAMESPACE=ghcr.io/long-d176 IMAGE_PREFIX=${IMAGE_PREFIX} APP_IMAGE_TAG=test GRAFANA_DOMAIN=grafana.tungtungtungtungsahur.site &&
            envsubst < deploy/k3s/db.yaml.tmpl >/dev/null &&
            envsubst < deploy/k3s/apps.yaml.tmpl >/dev/null
          "

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

  build-and-publish:
    runs-on: ubuntu-24.04
    needs: validate
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - service_name: frontend
            image_name: frontend
            context: ./frontend
          - service_name: catalog_service
            image_name: catalog
            context: ./services/catalog
          - service_name: otp_service
            image_name: otp
            context: ./services/otp
          - service_name: identity_service
            image_name: identity
            context: ./services/identity
          - service_name: booking_service
            image_name: booking
            context: ./services/booking
          - service_name: payment_service
            image_name: payment
            context: ./services/payment
          - service_name: redemption_service
            image_name: redemption
            context: ./services/redemption
          - service_name: scheduler_service
            image_name: scheduler
            context: ./services/scheduler
          - service_name: management_service
            image_name: management
            context: ./services/management
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Prepare image namespace
        run: echo "IMAGE_NAMESPACE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: local/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/${{ matrix.image_name }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Push versioned image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy-gate:
    runs-on: ubuntu-24.04
    needs: build-and-publish
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required deployment secrets
        id: check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          ADMIN_BOOTSTRAP_FULL_NAME: ${{ secrets.ADMIN_BOOTSTRAP_FULL_NAME }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          missing=0
          for var in \
            EC2_HOST EC2_USER EC2_SSH_KEY \
            MYSQL_ROOT_PASSWORD MYSQL_DATABASE MYSQL_USER MYSQL_PASSWORD \
            SMTP_EMAIL SMTP_PASSWORD JWT_SECRET \
            APP_DOMAIN GRAFANA_DOMAIN GRAFANA_ADMIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "Missing secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-production:
    runs-on: ubuntu-24.04
    needs:
      - build-and-publish
      - deploy-gate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.deploy-gate.outputs.ready == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare image namespace
        run: echo "IMAGE_NAMESPACE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Prepare remote deploy directory
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" "rm -rf ~/moviebooking-tier5 && mkdir -p ~/moviebooking-tier5"

      - name: Render production env file
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          ADMIN_BOOTSTRAP_FULL_NAME: ${{ secrets.ADMIN_BOOTSTRAP_FULL_NAME }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cat > .env.production <<EOF
          IMAGE_NAMESPACE=${IMAGE_NAMESPACE}
          IMAGE_PREFIX=${IMAGE_PREFIX}
          APP_IMAGE_TAG=${GITHUB_SHA}
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          SMTP_EMAIL=${SMTP_EMAIL}
          SMTP_PASSWORD=${SMTP_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL}
          ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
          ADMIN_BOOTSTRAP_FULL_NAME=${ADMIN_BOOTSTRAP_FULL_NAME}
          APP_DOMAIN=${APP_DOMAIN}
          GRAFANA_DOMAIN=${GRAFANA_DOMAIN}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          K8S_NAMESPACE=moviebooking
          K8S_APP_NODEPORT=30080
          K8S_GRAFANA_NODEPORT=30081
          EOF

      - name: Upload deployment assets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -r deploy monitoring database "${EC2_USER}@${EC2_HOST}:~/moviebooking-tier5/"
          scp -i ~/.ssh/deploy_key .env.production "${EC2_USER}@${EC2_HOST}:~/moviebooking-tier5/deploy/.env.production"

      - name: Deploy production Kubernetes stack
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" "
              cd ~/moviebooking-tier5 &&
              bash deploy/k3s/install-k3s.sh &&
              CUTOVER_NGINX=true bash deploy/k3s/deploy-k3s.sh deploy/.env.production
            "; then
              exit 0
            fi

            if [ \"$attempt\" -eq 3 ]; then
              echo \"Deployment failed after 3 attempts\"
              exit 1
            fi

            echo \"Deployment attempt $attempt failed; retrying in 10 seconds\"
            sleep 10
          done

      - name: Stop legacy Compose stack
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" "
            if [ -f ~/moviebooking-final/deploy/docker-compose.prod.yml ] && [ -f ~/moviebooking-final/deploy/.env.production ]; then
              cd ~/moviebooking-final &&
              docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production down || true
            fi
          "

      - name: Verify running Kubernetes services
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${EC2_USER}@${EC2_HOST}" "
            sudo k3s kubectl -n moviebooking get pods &&
            echo '---' &&
            sudo k3s kubectl -n moviebooking get svc,pvc &&
            echo '---' &&
            curl --fail --silent --show-error http://127.0.0.1:30080 > /dev/null &&
            curl --fail --silent --show-error http://127.0.0.1:30081/api/health
          "

      - name: Verify public app over HTTPS
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "https://${APP_DOMAIN}" > /dev/null

      - name: Verify Grafana health over HTTPS
        env:
          GRAFANA_DOMAIN: ${{ secrets.GRAFANA_DOMAIN }}
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "https://${GRAFANA_DOMAIN}/api/health"
